<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Store Nasra</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f7fb;
color:#222;
}

header{
background:linear-gradient(135deg,#0066ff,#7b2cff,#ff2ea6);
color:white;
text-align:center;
padding:60px 20px;
border-bottom-left-radius:40px;
border-bottom-right-radius:40px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

header h1{
font-size:50px;
font-weight:800;
}

header p{
margin-top:15px;
font-size:25px;
}

nav{
width:90%;
margin:-25px auto 30px;
background:white;
display:flex;
justify-content:space-around;
padding:18px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.12);
position:sticky;
top:10px;
z-index:100;
}

nav a{
text-decoration:none;
font-size:22px;
font-weight:bold;
color:#0066ff;
transition:.3s;
}

nav a:hover{
color:#ff2ea6;
}

.container{
width:92%;
margin:auto;
padding-bottom:40px;
}

</style>

</head>

<body>

<header>

<h1>🛒 My Store Nasra</h1>

<p>أهلاً بكم في متجرنا</p>

</header>

<nav>

<a href="#"><i class="fa fa-house"></i> الرئيسية</a>

<a href="#"><i class="fa fa-bag-shopping"></i> المنتجات</a>

<a href="#"><i class="fa fa-phone"></i> اتصل بنا</a>

</nav>

<div class="container"><div class="container"><style>
.product{
background:#fff;
border-radius:25px;
box-shadow:0 10px 25px rgba(0,0,0,.12);
display:flex;
align-items:center;
justify-content:space-between;
padding:20px;
margin-bottom:30px;
gap:20px;
}

.product img{
width:42%;
border-radius:20px;
background:#eef4ff;
padding:15px;
}

.info{
flex:1;
text-align:right;
}

.info h2{
font-size:38px;
color:#111;
margin-bottom:15px;
}

.price{
font-size:30px;
margin-bottom:20px;
}

.price span{
color:#0066ff;
font-weight:bold;
}

.buy-btn{
background:linear-gradient(135deg,#ff0055,#ff6600);
color:#fff;
border:none;
padding:16px 45px;
font-size:22px;
font-weight:bold;
border-radius:15px;
cursor:pointer;
transition:.3s;
box-shadow:0 8px 20px rgba(255,0,85,.35);
}

.buy-btn:hover{
transform:scale(1.05);
}
</style>

<div class="product">

<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=800" alt="هاتف">

<div class="info">

<h2>📱 هاتف ذكي</h2>

<p class="price">
السعر :
<span>250 دولار</span>
</p>

<button class="buy-btn">
شراء الآن
</button>

</div>

</div>

<div class="product">

<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800" alt="سماعات">

<div class="info">

<h2>🎧 سماعات لاسلكية</h2>

<p class="price">
السعر :
<span>50 دولار</span>
</p>

<button class="buy-btn">
شراء الآن
</button>

</div>

</div><style>
.features{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:18px;
margin:40px 0;
}

.feature{
background:#fff;
padding:25px 15px;
text-align:center;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
transition:.3s;
}

.feature:hover{
transform:translateY(-8px);
}

.feature i{
font-size:42px;
margin-bottom:15px;
}

.feature:nth-child(1) i{color:#6C63FF;}
.feature:nth-child(2) i{color:#00C853;}
.feature:nth-child(3) i{color:#FF9800;}
.feature:nth-child(4) i{color:#E91E63;}

.feature h3{
margin-bottom:10px;
}

footer{
margin-top:40px;
background:linear-gradient(135deg,#0066ff,#7b2cff,#ff2ea6);
color:white;
text-align:center;
padding:35px 20px;
border-top-left-radius:30px;
border-top-right-radius:30px;
}

.social{
margin:20px 0;
}

.social a{
display:inline-flex;
justify-content:center;
align-items:center;
width:55px;
height:55px;
background:white;
color:#0066ff;
border-radius:50%;
margin:0 8px;
font-size:24px;
text-decoration:none;
transition:.3s;
}

.social a:hover{
transform:scale(1.15);
background:#ff2ea6;
color:#fff;
}
</style>

<div class="features">

<div class="feature">
<i class="fas fa-shield-alt"></i>
<h3>ضمان الجودة</h3>
<p>منتجات أصلية 100%</p>
</div>

<div class="feature">
<i class="fas fa-truck"></i>
<h3>شحن سريع</h3>
<p>توصيل في أسرع وقت</p>
</div>

<div class="feature">
<i class="fas fa-tags"></i>
<h3>أسعار منافسة</h3>
<p>أفضل الأسعار دائماً</p>
</div>

<div class="feature">
<i class="fas fa-headset"></i>
<h3>دعم 24/7</h3>
<p>خدمة العملاء طوال اليوم</p>
</div>

</div>

</div>

<footer>

<h2>My Store Nasra 2025 ©</h2>

<div class="social">
<a href="#"><i class="fab fa-facebook-f"></i></a>
<a href="#"><i class="fab fa-instagram"></i></a>
<a href="#"><i class="fab fa-x-twitter"></i></a>
<a href="#"><i class="fab fa-whatsapp"></i></a>
</div>

</footer>

</body>
</html>
