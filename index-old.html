<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Store Nasra</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }

        header {
            background: #2196F3;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background: #1976D2;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .product {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        button {
            background: green;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

<header>
    <h1>🛒 My Store Nasra</h1>
    <p>أهلاً بكم في متجرنا</p>
</header>

<nav>
    <a href="#">الرئيسية</a>
    <a href="#">المنتجات</a>
    <a href="#">اتصل بنا</a>
</nav>

<div class="container">

    <div class="product">
        <h2>📱 هاتف ذكي</h2>
        <p>السعر: 250 دولار</p>
        <button>شراء</button>
    </div>

    <div class="product">
        <h2>🎧 سماعات لاسلكية</h2>
        <p>السعر: 50 دولار</p>
        <button>شراء</button>
    </div>

</div>

<footer>
    © 2025 My Store Nasra
</footer>

</body>
</html>
